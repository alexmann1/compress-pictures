name: Build and deploy Compress Pictures

on:
  push:
    branches: [ "main" ]
  # or use pull_request, or another event as needed

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    
    steps:
      # 1) Check out repo
      - name: Check out repository
        uses: actions/checkout@v4

      # 2) Set up Node (change version if you prefer 16, 18, etc.)
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3) Install dependencies
      - name: Install dependencies
        run: npm ci
        # or "npm install" if you prefer

      # 4) Build production files
      - name: Build
        run: npm run build
        # By default, Vite outputs to a "dist" folder

      # 5) Package the dist folder for transfer
      - name: Package build artifacts
        run: zip -r dist.zip dist

      # 6) Securely copy dist.zip to the VM
      - name: Copy files to Azure VM
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: 22  # change if non-standard
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          overwrite: true
          source: "dist.zip"
          target: "/var/www/compresspictures/"  # adjust the path on your VM

      # 7) SSH into VM to finalize deployment
      - name: Finalize deploy on VM
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          port: 22
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/compresspictures/
            unzip -o dist.zip
            # Move or copy files to your final location
            rm -rf www
            mv dist www
            
            # Create a server-side post-deploy script to fix SEO metadata
            cat > /var/www/compresspictures/fix-seo.js << 'EOL'
            const fs = require('fs');
            const path = require('path');
            
            console.log('[SEO-Fix] Starting SEO metadata fix script on server...');
            
            // Define the metadata for each route
            const routeMetadata = {
              '/': {
                title: 'Free Online Image Resizer/Compression - High-Quality & Fast',
                description: 'Instantly reduce your image file size, effortlessly adapt them for any social media platform, and quickly convert between image formats.',
                keywords: 'image optimizer, image compression, image converter, compress jpeg, compress png, compress webp, compress gif, compress svg, free image tool, online image compression'
              },
              '/privacy': {
                title: 'Privacy Policy - CompressPictures.com',
                description: 'Privacy Policy for CompressPictures.com - Learn how we handle your data and protect your privacy.',
                keywords: 'privacy policy, data protection, image optimizer privacy, user data, cookies policy'
              },
              '/terms': {
                title: 'Terms of Service - CompressPictures.com',
                description: 'Terms of Service for CompressPictures.com - Understand the rules and conditions for using our image optimization services.',
                keywords: 'terms of service, terms and conditions, user agreement, service terms, legal terms'
              },
              '/faq': {
                title: 'FAQ - CompressPictures.com',
                description: 'Frequently Asked Questions about our image optimization services.',
                keywords: 'image optimizer faq, compress pictures help, image compression questions, frequently asked questions'
              },
              '/features': {
                title: 'Features - CompressPictures.com',
                description: 'Explore the features of our free image optimization service.',
                keywords: 'image optimizer features, compress pictures features, image compression options, free image tools'
              }
            };
            
            // Map HTML files to their routes
            const fileToRouteMap = {
              'index.html': '/',
              'privacy.html': '/privacy',
              'terms.html': '/terms',
              'faq.html': '/faq',
              'features.html': '/features'
            };
            
            // Get the list of HTML files in the www directory
            const wwwDir = '/var/www/compresspictures/www';
            const files = fs.readdirSync(wwwDir);
            const htmlFiles = files.filter(file => file.endsWith('.html'));
            
            console.log(`[SEO-Fix] Found ${htmlFiles.length} HTML files in www directory: ${htmlFiles.join(', ')}`);
            
            // Process each HTML file
            htmlFiles.forEach(htmlFile => {
              const route = fileToRouteMap[htmlFile] || '/';
              const meta = routeMetadata[route];
              const filePath = path.join(wwwDir, htmlFile);
              
              console.log(`[SEO-Fix] Processing ${htmlFile} with route ${route}`);
              
              try {
                // Read the HTML file
                let html = fs.readFileSync(filePath, 'utf8');
                
                // Make a backup
                fs.writeFileSync(`${filePath}.bak`, html);
                
                // Replace the title tag
                html = html.replace(
                  /<title>[^<]*<\/title>/i,
                  `<title>${meta.title}</title>`
                );
                
                // Replace the meta description
                html = html.replace(
                  /<meta name="description" content="[^"]*"/i,
                  `<meta name="description" content="${meta.description}"`
                );
                
                // Replace the meta keywords
                html = html.replace(
                  /<meta name="keywords" content="[^"]*"/i,
                  `<meta name="keywords" content="${meta.keywords}"`
                );
                
                // Replace Open Graph title
                html = html.replace(
                  /<meta property="og:title" content="[^"]*"/i,
                  `<meta property="og:title" content="${meta.title}"`
                );
                
                // Replace Open Graph description
                html = html.replace(
                  /<meta property="og:description" content="[^"]*"/i,
                  `<meta property="og:description" content="${meta.description}"`
                );
                
                // Replace Open Graph URL
                html = html.replace(
                  /<meta property="og:url" content="[^"]*"/i,
                  `<meta property="og:url" content="https://compresspictures.com${route === '/' ? '' : route}"`
                );
                
                // Replace Twitter title
                html = html.replace(
                  /<meta name="twitter:title" content="[^"]*"/i,
                  `<meta name="twitter:title" content="${meta.title}"`
                );
                
                // Replace Twitter description
                html = html.replace(
                  /<meta name="twitter:description" content="[^"]*"/i,
                  `<meta name="twitter:description" content="${meta.description}"`
                );
                
                // Write the updated HTML back to the file
                fs.writeFileSync(filePath, html);
                
                // Verify the changes
                const updatedHtml = fs.readFileSync(filePath, 'utf8');
                const titleMatch = /<title>([^<]*)<\/title>/i.exec(updatedHtml);
                const descMatch = /<meta name="description" content="([^"]*)"/i.exec(updatedHtml);
                
                if (titleMatch && titleMatch[1] === meta.title && 
                    descMatch && descMatch[1] === meta.description) {
                  console.log(`[SEO-Fix] Successfully updated metadata for ${htmlFile}. Title: "${titleMatch[1]}"`);
                } else {
                  console.log(`[SEO-Fix] WARNING: Metadata verification failed for ${htmlFile}.`);
                  if (titleMatch) console.log(`[SEO-Fix] Title: "${titleMatch[1]}"`);
                  if (descMatch) console.log(`[SEO-Fix] Description: "${descMatch[1]}"`);
                }
              } catch (error) {
                console.error(`[SEO-Fix] Error processing ${htmlFile}:`, error.message);
              }
            });
            
            console.log('[SEO-Fix] SEO metadata update complete!');
            EOL
            
            # Execute the server-side fix script
            echo "Running server-side SEO fix script..."
            node /var/www/compresspictures/fix-seo.js
            
            # Cleanup the deploy folder if you want
            rm -rf dist.zip