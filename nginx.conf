server {
    listen 80;
    server_name compresspictures.com www.compresspictures.com;
    
    # Root directory where the app is deployed
    root /var/www/compresspictures/www;
    
    # Index file
    index index.html;
    
    # Add additional security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    
    # Handles direct access to .html files
    location ~ \.html$ {
        try_files $uri =404;
    }
    
    # For URL without extension (e.g., /privacy)
    location ~ ^/(privacy|terms|features)$ {
        # Try to find the corresponding HTML file directly
        # If not found, try the directory with index.html
        # If still not found, fallback to index.html for SPA routing
        try_files $uri $uri.html $uri/index.html /index.html;
    }
    
    # Serve static assets (images, css, js)
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }
    
    # For all other URLs, try the path directly, then try as a directory + index.html,
    # then try adding .html, finally fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }
    
    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
